<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="#3b82f6"/>
  <!-- Book body -->
  <rect x="7" y="6" width="12" height="20" rx="2" fill="white" opacity="0.95"/>
  <!-- Book spine -->
  <rect x="7" y="6" width="3" height="20" rx="1" fill="#93c5fd"/>
  <!-- Book lines (pages) -->
  <rect x="12" y="11" width="5" height="1.5" rx="0.75" fill="#3b82f6" opacity="0.5"/>
  <rect x="12" y="14" width="5" height="1.5" rx="0.75" fill="#3b82f6" opacity="0.5"/>
  <rect x="12" y="17" width="3" height="1.5" rx="0.75" fill="#3b82f6" opacity="0.5"/>
  <!-- Second book (behind, offset) -->
  <rect x="16" y="8" width="10" height="18" rx="2" fill="white" opacity="0.4"/>
  <rect x="16" y="8" width="2.5" height="18" rx="1" fill="#93c5fd" opacity="0.5"/>
</svg>
